experiment:
  name: glot_lclm_squad_r8_pooler_only
  output_dir: outputs/glot_lclm_squad_r8_pooler_only
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [squad, latent_context, glot, pooler_only, qwen4b, r8]

dataset:
  name: rajpurkar/squad
  config_name: null
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 16
  include_titles: true
  prompt_style: lclm_memory
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: latent-context/0.6b-4b-LCLM-8x
  encoder_subfolder: encoder
  decoder_name: latent-context/0.6b-4b-LCLM-8x
  decoder_subfolder: decoder
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

compression:
  pooler: glot
  ratio: 8
  encoder_window_tokens: 1024
  adapter: lclm_mlp
  adapter_checkpoint:
    repo_id: latent-context/0.6b-4b-LCLM-8x
    filename: adapter/adapter.safetensors
    format: lclm
    strict: true
  glot:
    hidden_dim: 384
    output_dim: 1024
    num_layers: 2
    heads: 4
    graph: topk
    gnn_type: gat
    topk: 4
    tau: 0.25
    local_edges: true
    dropout: 0.05
    jk: cat
    residual_mean: true
    zero_init_output: true

lora:
  encoder:
    enabled: false
  decoder:
    enabled: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: compressed_pooler_only
      mode: compressed
      steps: 1000
      lr: 2.0e-4
      train_pooler: true
      train_adapter: false
      train_encoder_lora: false
      train_decoder_lora: false

generation:
  max_new_tokens: 16
  do_sample: false
  temperature: 0.0

