program: src/glot_lclm/training/train.py
method: grid
metric:
  name: eval/f1
  goal: maximize
parameters:
  config:
    value: configs/glot_squad_qwen05_8k_r4_sft.yaml
  compression.ratio:
    values: [4, 8]
  compression.glot.topk:
    values: [2, 4, 7]
  compression.glot.gnn_type:
    values: [gat, gcn, sage]
  compression.glot.num_layers:
    values: [1, 2]
  lora.encoder.r:
    values: [4, 8]
  lora.decoder.r:
    values: [4, 8]
command:
  - ${env}
  - python
  - -m
  - glot_lclm.training.train
  - --config
  - ${config}
  - ${args_no_hyphens}
