experiment:
  name: full_context_squad_qwen05
  output_dir: outputs/full_context_squad_qwen05
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [squad, full_context, qwen05, sft]

dataset:
  name: rajpurkar/squad
  config_name: null
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 16
  include_titles: true
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: null
  decoder_name: Qwen/Qwen2.5-0.5B-Instruct
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

lora:
  decoder:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: task_lora_warmup_full_context
      mode: full_context
      steps: 300
      lr: 2.0e-4
      train_decoder_lora: true

generation:
  max_new_tokens: 8
  do_sample: false
  temperature: 0.0
