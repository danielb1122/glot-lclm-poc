experiment:
  name: glot_repeat_level5_qwen05_r4
  output_dir: outputs/glot_repeat_level5_qwen05_r4
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [repeat, level5, glot, lclm, qwen05, r4]

dataset:
  name: d4nieldev/glotcond-cola-repeat-levels
  config_name: level_5
  train_split: train
  eval_split: test
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 2048
  max_answer_tokens: 256
  include_titles: false
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: Qwen/Qwen3-Embedding-0.6B
  decoder_name: Qwen/Qwen2.5-0.5B-Instruct
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

compression:
  pooler: glot
  ratio: 4
  encoder_window_tokens: 512
  adapter: paper_mlp
  glot:
    hidden_dim: 384
    num_layers: 2
    heads: 4
    graph: topk
    gnn_type: gat
    topk: 4
    tau: 0.25
    local_edges: true
    dropout: 0.05
    jk: cat

lora:
  encoder:
    enabled: false
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]
  decoder:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: task_lora_warmup_full_context
      mode: full_context
      steps: 500
      lr: 2.0e-4
      train_pooler: false
      train_adapter: false
      train_encoder_lora: false
      train_decoder_lora: true
    - name: adapter_pooler_alignment
      mode: compressed
      steps: 1500
      lr: 2.0e-4
      train_pooler: true
      train_adapter: true
      train_encoder_lora: false
      train_decoder_lora: true
    - name: compressed_sft
      mode: compressed
      steps: 1000
      lr: 5.0e-5
      train_pooler: true
      train_adapter: true
      train_encoder_lora: false
      train_decoder_lora: true

generation:
  max_new_tokens: 256
  do_sample: false
  temperature: 0.0

