experiment:
  name: mean_lclm_repeat_level20_qwen4b_r4
  output_dir: outputs/mean_lclm_repeat_level20_qwen4b_r4
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [repeat, level20, latent_context, mean, qwen4b, r4]

dataset:
  name: d4nieldev/glotcond-cola-repeat-levels
  config_name: level_20
  train_split: train
  eval_split: test
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 512
  include_titles: false
  prompt_style: lclm_memory
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: latent-context/0.6b-4b-LCLM-4x
  encoder_subfolder: encoder
  decoder_name: latent-context/0.6b-4b-LCLM-4x
  decoder_subfolder: decoder
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

compression:
  pooler: mean
  ratio: 4
  encoder_window_tokens: 1024
  adapter: lclm_mlp
  adapter_checkpoint:
    repo_id: latent-context/0.6b-4b-LCLM-4x
    filename: adapter/adapter.safetensors
    format: lclm
    strict: true

lora:
  encoder:
    enabled: false
  decoder:
    enabled: false

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages: []

generation:
  max_new_tokens: 512
  do_sample: false
  temperature: 0.0

