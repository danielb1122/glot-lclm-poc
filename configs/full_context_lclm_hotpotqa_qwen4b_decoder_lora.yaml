experiment:
  name: full_context_lclm_hotpotqa_qwen4b_decoder_lora
  output_dir: outputs/full_context_lclm_hotpotqa_qwen4b_decoder_lora
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [hotpotqa, distractor, full_context, decoder_lora, qwen4b, no_compression, upper_bound]

dataset:
  name: hotpotqa/hotpot_qa
  config_name: distractor
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 24
  include_titles: true
  prompt_style: lclm_memory
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: null
  decoder_name: latent-context/0.6b-4b-LCLM-16x
  decoder_subfolder: decoder
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

lora:
  decoder:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  num_workers: 8
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: full_context_decoder_lora
      mode: full_context
      steps: 2500
      lr: 5.0e-5
      weight_decay: 0.05
      scheduler: constant
      train_decoder_lora: true

generation:
  max_new_tokens: 24
  do_sample: false
  temperature: 0.0
