experiment:
  name: mean_2wiki_lclm_encoder_qwen05_full_decoder_poc
  output_dir: outputs/mean_2wiki_lclm_encoder_qwen05_full_decoder_poc
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [2wiki, multihop, latent_context, mean, lclm_encoder, qwen05, full_decoder, adapter_scratch, r16, poc]

dataset:
  name: framolfese/2WikiMultihopQA
  config_name: null
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 24
  include_titles: true
  prompt_style: lclm_memory
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: latent-context/0.6b-4b-LCLM-16x
  encoder_subfolder: encoder
  decoder_name: Qwen/Qwen2.5-0.5B-Instruct
  decoder_subfolder: null
  share_tokenizer: false
  load_in_4bit: false
  encoder_load_in_4bit: true
  decoder_load_in_4bit: false
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true
  decoder_special_tokens: ["<|memory_start|>", "<|memory_end|>"]

compression:
  pooler: mean
  ratio: 16
  encoder_window_tokens: 1024
  adapter: lclm_mlp
  adapter_checkpoint: null

lora:
  encoder:
    enabled: false
  decoder:
    enabled: false

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  num_workers: 8
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: mean_adapter_full_decoder_poc
      mode: compressed
      steps: 2500
      lr: 1.0e-5
      weight_decay: 0.01
      optimizer: adamw8bit
      scheduler: cosine
      warmup_ratio: 0.04
      train_pooler: false
      train_adapter: true
      train_encoder_lora: false
      train_decoder_lora: false
      train_decoder_full: true

generation:
  max_new_tokens: 24
  do_sample: false
  temperature: 0.0
