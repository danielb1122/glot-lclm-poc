experiment:
  name: glot_lclm_2wiki_r16_pooler_decoder_lora
  output_dir: outputs/glot_lclm_2wiki_r16_pooler_decoder_lora
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [2wiki, multihop, latent_context, glot, pooler_decoder_lora, adapter_frozen, mean_init, qwen4b, r16]

dataset:
  name: framolfese/2WikiMultihopQA
  config_name: null
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 0
  eval_limit: 0
  max_context_tokens: 4092
  max_answer_tokens: 24
  include_titles: true
  prompt_style: lclm_memory
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: latent-context/0.6b-4b-LCLM-16x
  encoder_subfolder: encoder
  decoder_name: latent-context/0.6b-4b-LCLM-16x
  decoder_subfolder: decoder
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

compression:
  pooler: glot
  ratio: 16
  encoder_window_tokens: 1024
  adapter: lclm_mlp
  adapter_checkpoint:
    repo_id: latent-context/0.6b-4b-LCLM-16x
    filename: adapter/adapter.safetensors
    format: lclm
    strict: true
  glot:
    implementation: pyg
    hidden_dim: 384
    output_dim: 1024
    num_layers: 2
    graph: threshold
    conv: gat
    tau: 0.6
    jk: cat
    residual_mean: false
    zero_init_output: false
    init_as_mean: true

lora:
  encoder:
    enabled: false
  decoder:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 4
  gradient_accumulation_steps: 2
  num_workers: 8
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 500
  log_every_steps: 10
  stages:
    - name: compressed_pooler_decoder_lora_mean_init_adapter_frozen
      mode: compressed
      steps: 2500
      lr: 5.0e-5
      weight_decay: 0.02
      scheduler: cosine
      warmup_ratio: 0.04
      train_pooler: true
      train_adapter: false
      train_encoder_lora: false
      train_decoder_lora: true

generation:
  max_new_tokens: 24
  do_sample: false
  temperature: 0.0
