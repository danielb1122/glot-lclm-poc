experiment:
  name: smoke_tiny_glot
  output_dir: outputs/smoke_tiny_glot
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: disabled
  tags: [smoke, tiny, glot]

dataset:
  name: null
  config_name: null
  train_split: train
  eval_split: train
  local_data_files:
    train: data/smoke_qa.jsonl
  train_limit: 4
  eval_limit: 4
  max_context_tokens: 64
  max_answer_tokens: 8
  include_titles: true
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: tiny-random
  decoder_name: tiny-random
  tiny_tokenizer_name: bert-base-uncased
  tiny_hidden_size: 64
  tiny_encoder_layers: 2
  tiny_decoder_layers: 2
  tiny_attention_heads: 4
  tiny_intermediate_size: 128
  share_tokenizer: true
  load_in_4bit: false
  dtype: float32
  gradient_checkpointing: false
  trust_remote_code: false

compression:
  pooler: glot
  ratio: 4
  adapter: mlp
  adapter_hidden_multiplier: 1
  glot:
    hidden_dim: 64
    num_layers: 1
    heads: 4
    graph: topk
    gnn_type: gat
    topk: 2
    tau: 0.25
    local_edges: true
    dropout: 0.0
    jk: cat

lora:
  encoder:
    enabled: false
  decoder:
    enabled: false

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  num_workers: 0
  max_grad_norm: 1.0
  save_every_steps: 20
  eval_every_steps: 2
  log_every_steps: 1
  stages:
    - name: adapter_pooler_alignment
      mode: compressed
      steps: 3
      lr: 1.0e-3
      train_pooler: true
      train_adapter: true
      train_encoder_lora: false
      train_decoder_lora: false

generation:
  max_new_tokens: 4
  do_sample: false
  temperature: 0.0

