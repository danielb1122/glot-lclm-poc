experiment:
  name: mean_musique_qwen05
  output_dir: outputs/mean_musique_qwen05
  seed: 42
  wandb_project: glot-lclm-poc
  wandb_entity: null
  wandb_mode: online
  tags: [musique, mean, lclm, qwen05]

dataset:
  name: dgslibisey/MuSiQue
  config_name: null
  train_split: train
  eval_split: validation
  local_data_files: null
  train_limit: 2000
  eval_limit: 300
  max_context_tokens: 8192
  max_answer_tokens: 32
  include_titles: true
  evidence_auxiliary_weight: 0.0

model:
  encoder_name: Qwen/Qwen3-Embedding-0.6B
  decoder_name: Qwen/Qwen2.5-0.5B-Instruct
  share_tokenizer: true
  load_in_4bit: true
  dtype: bfloat16
  gradient_checkpointing: true
  trust_remote_code: true

compression:
  pooler: mean
  ratio: 8
  adapter: mlp
  adapter_hidden_multiplier: 2

lora:
  encoder:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]
  decoder:
    enabled: true
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

training:
  batch_size: 1
  gradient_accumulation_steps: 8
  num_workers: 2
  max_grad_norm: 1.0
  save_every_steps: 500
  eval_every_steps: 250
  log_every_steps: 10
  stages:
    - name: task_lora_warmup_full_context
      mode: full_context
      steps: 400
      lr: 2.0e-4
      train_pooler: false
      train_adapter: false
      train_encoder_lora: false
      train_decoder_lora: true
    - name: adapter_pooler_alignment
      mode: compressed
      steps: 500
      lr: 2.0e-4
      train_pooler: false
      train_adapter: true
      train_encoder_lora: false
      train_decoder_lora: false
    - name: encoder_lora_alignment
      mode: compressed
      steps: 600
      lr: 1.0e-4
      train_pooler: false
      train_adapter: true
      train_encoder_lora: true
      train_decoder_lora: false
    - name: decoder_lora_task_tuning
      mode: compressed
      steps: 600
      lr: 5.0e-5
      train_pooler: false
      train_adapter: true
      train_encoder_lora: true
      train_decoder_lora: true

generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 0.0
